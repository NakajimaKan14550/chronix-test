<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHRONIX | 半導体検査装置の物理的限界と次世代光学戦略</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary-green: #0d4d4d;
            --accent-gold: #d4af37;
            --text-dark: #334155;
            --bg-light: #f8fafc;
            --white: #ffffff;
        }

        * { box-sizing: border-box; scroll-behavior: smooth; }
        body { margin: 0; font-family: 'Noto Sans JP', sans-serif; color: var(--text-dark); background-color: #e2e8f0; line-height: 1.6; }

        section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 80px 40px;
            position: relative;
            background: var(--white);
            border-bottom: 1px solid #e2e8f0;
        }

        .dark-section { background-color: var(--primary-green); color: var(--white); }
        .container { max-width: 1200px; width: 100%; z-index: 2; }
        .container-fluid { width: 100%; padding: 0; }

        /* タイポグラフィ */
        h1, h2, h3 { font-family: 'Urbanist', sans-serif; font-weight: 700; margin: 0; }
        h1 { font-size: 64px; line-height: 1.1; margin-bottom: 20px; color: var(--white); }
        .slide-title { font-size: 36px; margin-bottom: 40px; border-left: 12px solid var(--accent-gold); padding-left: 20px; color: var(--primary-green); }
        .dark-section .slide-title { color: var(--white); }
        h2 { font-size: 56px; margin-bottom: 20px; }
        h3 { font-size: 28px; margin-bottom: 15px; color: #1e6b6b; }
        .dark-section h3 { color: var(--accent-gold); }

        /* ロゴ */
        .logo-box { background: white; padding: 20px; border-radius: 8px; display: inline-block; margin-bottom: 40px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .logo-box img { height: 80px; }

        /* レイアウトツール */
        .two-column { display: grid; grid-template-columns: 1fr 1fr; gap: 50px; align-items: center; }
        .tiled-box { background-color: #f8fafc; border-radius: 12px; border: 1px solid #e2e8f0; padding: 30px; margin-bottom: 20px; }
        
        /* 画像ラッパー */
        .image-wrapper { border-radius: 12px; overflow: hidden; border: 1px solid #e2e8f0; background: #fff; width: 100%; height: 450px; display: flex; align-items: center; justify-content: center; }
        .image-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        .image-wrapper.contain img { object-fit: contain; padding: 20px; }

        /* 特大画像セクション用 */
        .row { display: flex; flex-wrap: wrap; width: 100%; margin: 0; }
        .col-lg-4 { flex: 0 0 33.3333%; max-width: 33.3333%; padding: 40px; }
        .col-lg-8 { flex: 0 0 66.6666%; max-width: 66.6666%; padding: 0; }

        .tile-grid { display: flex; gap: 30px; margin-top: 20px; }
        .tile { background-color: #f8fafc; border-radius: 12px; border: 1px solid #e2e8f0; flex: 1; padding: 30px; text-align: center; border-top: 6px solid var(--primary-green); }
        .tile i { color: var(--accent-gold); font-size: 40px; margin-bottom: 20px; }

        .formula-box { background: #f1f5f9; border-radius: 8px; padding: 20px; border-left: 6px solid var(--primary-green); font-size: 24px; margin: 20px 0; font-family: serif; }
        .big-number { font-size: 150px; font-weight: 700; color: var(--primary-green); line-height: 1; }

        @media (max-width: 992px) {
            .two-column, .row { display: block; }
            .col-lg-4, .col-lg-8 { width: 100%; max-width: 100%; }
            .image-wrapper { height: auto; }
            .tile-grid { flex-direction: column; }
        }
    </style>
</head>
<body>

    <section class="dark-section" style="text-align: center;">
        <div class="container">
            <div class="logo-box">
                <img src="logo.png" alt="CHRONIX Logo">
            </div>
            <h1>半導体検査装置の<br><span style="color: var(--accent-gold);">物理的限界</span>と次世代光学戦略</h1>
            <p style="font-size: 24px; color: #cbd5e1;">液体レンズ(Varioptic) による高付加価値レトロフィットの提案</p>
        </div>
    </section>

    <section>
        <div class="container" style="text-align: center;">
            <p style="font-size: 32px; color: #1e6b6b; font-weight: bold; margin-bottom: 0;">Section 01</p>
            <hr style="border:none; height:5px; background:var(--accent-gold); width:120px; margin:30px auto;">
            <h2>物理的障壁</h2>
        </div>
    </section>

    <section style="padding: 0; background: #fff;">
        <div class="container-fluid">
            <div class="row align-items-center">
                <div class="col-lg-4">
                    <h2 class="slide-title">2nmノードが直面する致命的な壁
